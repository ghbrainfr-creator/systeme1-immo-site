<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="S1 registered app icon">

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2EC8FF"/>
      <stop offset="48%" stop-color="#5A7CFF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2EC8FF"/>
      <stop offset="55%" stop-color="#5A7CFF"/>
      <stop offset="100%" stop-color="#C7A6FF"/>
    </linearGradient>
    <radialGradient id="navyGlow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0B245A" stop-opacity="0.55"/>
      <stop offset="52%" stop-color="#071432" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#02050F" stop-opacity="1"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tinyGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="70" y="70" width="884" height="884" rx="190" fill="url(#navyGlow)"/>
  <circle cx="512" cy="512" r="335" fill="none" stroke="url(#textGrad)" stroke-width="28" filter="url(#softGlow)"/>
  <text x="300" y="660" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="335" font-weight="800" letter-spacing="-10" fill="url(#textGrad)" filter="url(#tinyGlow)">S1</text>
  <text x="725" y="390" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" fill="#C7A6FF" filter="url(#tinyGlow)">®</text>
</svg>